version: "2"
sql:
  - engine: postgresql
    schema:
      - internal/db/migrations/*.up.sql
    queries: internal/db/queries
    gen:
      go:
        package: db
        out: internal/db/sqlc
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_pointers_for_null_types: true